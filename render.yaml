services:
  - type: worker
    name: termchat-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 9999
      - key: ADMIN_CODE
        sync: false  # A definir manuellement dans le dashboard Render (min. 12 caracteres aleatoires, jamais dans le code/le repo)
